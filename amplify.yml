version: 1
applications:
  - appRoot: vyapar-sahayak
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
            - npx prisma generate
        build:
          commands:
            - rm -rf .next/cache
            - TURBOPACK=0 npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
