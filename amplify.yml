version: 1
applications:
  - appRoot: vyapar-sahayak
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
            - npx prisma generate
            - DATABASE_URL="REDACTED_TURSO_URL" TURSO_AUTH_TOKEN="REDACTED_TURSO_TOKEN" npx prisma db push --accept-data-loss 2>/dev/null || true
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
